<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awaaz API Test Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .test-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .response {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .response.success {
            border-color: #28a745;
            background: #f0fff4;
        }
        
        .response.error {
            border-color: #dc3545;
            background: #fff5f5;
            color: #dc3545;
        }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        textarea {
            min-height: 80px;
            font-family: inherit;
        }
        
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .status.online {
            background: #d4edda;
            color: #155724;
        }
        
        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }
        
        .file-input {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Awaaz API Test Page</h1>
        <p class="subtitle">Test all API endpoints before recording your demo</p>
        
        <!-- Health Check -->
        <div class="test-section">
            <h2>1. Health Check <span id="health-status" class="status offline">Offline</span></h2>
            <button onclick="testHealth()">Check Backend Status</button>
            <div id="health-response" class="response" style="display:none;"></div>
        </div>
        
        <!-- Chat API -->
        <div class="test-section">
            <h2>2. Chat API (AI Scheme Matching)</h2>
            <textarea id="chat-message" placeholder="Enter your message (e.g., 'I am a farmer with 2 acres of land')">I am a farmer with 2 acres of land</textarea>
            <button onclick="testChat()">Send Message</button>
            <div id="chat-response" class="response" style="display:none;"></div>
        </div>
        
        <!-- Get Schemes -->
        <div class="test-section">
            <h2>3. Get All Schemes</h2>
            <button onclick="testSchemes()">Fetch Schemes</button>
            <div id="schemes-response" class="response" style="display:none;"></div>
        </div>
        
        <!-- Document Upload -->
        <div class="test-section">
            <h2>4. Document Upload (OCR)</h2>
            <input type="file" id="document-file" class="file-input" accept="image/*">
            <input type="text" id="document-type" placeholder="Document type (e.g., aadhaar, pan)" value="aadhaar">
            <button onclick="testUpload()">Upload & Verify</button>
            <div id="upload-response" class="response" style="display:none;"></div>
        </div>
        
        <!-- Generate Affidavit -->
        <div class="test-section">
            <h2>5. Generate Affidavit</h2>
            <input type="text" id="user-name" placeholder="User Name" value="Ram Kumar">
            <input type="text" id="father-name" placeholder="Father's Name" value="Shyam Kumar">
            <input type="text" id="address" placeholder="Address" value="Village Rampur, District Sitapur, UP">
            <input type="text" id="purpose" placeholder="Purpose" value="Income Certificate">
            <button onclick="testAffidavit()">Generate PDF</button>
            <div id="affidavit-response" class="response" style="display:none;"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        // Test health check
        async function testHealth() {
            const responseDiv = document.getElementById('health-response');
            const statusSpan = document.getElementById('health-status');
            responseDiv.style.display = 'block';
            responseDiv.textContent = 'Loading...';
            
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
                responseDiv.className = 'response success';
                statusSpan.textContent = 'Online';
                statusSpan.className = 'status online';
            } catch (error) {
                responseDiv.textContent = `Error: ${error.message}\n\nMake sure backend is running:\ncd backend && uvicorn main:app --reload`;
                responseDiv.className = 'response error';
                statusSpan.textContent = 'Offline';
                statusSpan.className = 'status offline';
            }
        }

        // Test chat API
        async function testChat() {
            const message = document.getElementById('chat-message').value;
            const responseDiv = document.getElementById('chat-response');
            responseDiv.style.display = 'block';
            responseDiv.textContent = 'Loading...';
            
            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, language: 'en' })
                });
                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
                responseDiv.className = 'response success';
            } catch (error) {
                responseDiv.textContent = `Error: ${error.message}`;
                responseDiv.className = 'response error';
            }
        }

        // Test get schemes
        async function testSchemes() {
            const responseDiv = document.getElementById('schemes-response');
            responseDiv.style.display = 'block';
            responseDiv.textContent = 'Loading...';
            
            try {
                const response = await fetch(`${API_URL}/api/schemes`);
                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
                responseDiv.className = 'response success';
            } catch (error) {
                responseDiv.textContent = `Error: ${error.message}`;
                responseDiv.className = 'response error';
            }
        }

        // Test document upload
        async function testUpload() {
            const fileInput = document.getElementById('document-file');
            const documentType = document.getElementById('document-type').value;
            const responseDiv = document.getElementById('upload-response');
            
            if (!fileInput.files[0]) {
                alert('Please select a file first');
                return;
            }
            
            responseDiv.style.display = 'block';
            responseDiv.textContent = 'Uploading and processing...';
            
            try {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('document_type', documentType);
                
                const response = await fetch(`${API_URL}/api/upload-document`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
                responseDiv.className = 'response success';
            } catch (error) {
                responseDiv.textContent = `Error: ${error.message}`;
                responseDiv.className = 'response error';
            }
        }

        // Test affidavit generation
        async function testAffidavit() {
            const responseDiv = document.getElementById('affidavit-response');
            responseDiv.style.display = 'block';
            responseDiv.textContent = 'Generating PDF...';
            
            try {
                const data = {
                    user_name: document.getElementById('user-name').value,
                    father_name: document.getElementById('father-name').value,
                    address: document.getElementById('address').value,
                    purpose: document.getElementById('purpose').value,
                    language: 'en'
                };
                
                const response = await fetch(`${API_URL}/api/generate-affidavit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                responseDiv.textContent = JSON.stringify(result, null, 2);
                responseDiv.className = 'response success';
            } catch (error) {
                responseDiv.textContent = `Error: ${error.message}`;
                responseDiv.className = 'response error';
            }
        }

        // Auto-check health on page load
        window.onload = () => {
            testHealth();
        };
    </script>
</body>
</html>
